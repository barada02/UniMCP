<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniMCP Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-slate-900 text-slate-200 font-sans min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-80 bg-slate-800 border-r border-slate-700 flex flex-col">
        <div class="p-6 border-b border-slate-700">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span class="text-blue-400">🔌</span> UniMCP
            </h1>
            <p class="text-xs text-slate-400 mt-1">MCP Explorer Dashboard</p>
        </div>

        <div class="p-6 space-y-6 flex-1">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Server Endpoint</label>
                <input type="text" id="endpoint"
                       class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                       placeholder="http://localhost:8000/sse">
            </div>

            <div class="flex gap-2">
                <button id="btn-connect" onclick="app.connect()"
                        class="flex-1 bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium py-2 rounded transition-colors">
                    Connect
                </button>
                <button id="btn-disconnect" onclick="app.disconnect()"
                        class="flex-1 bg-slate-700 hover:bg-slate-600 text-white text-sm font-medium py-2 rounded transition-colors hidden">
                    Disconnect
                </button>
            </div>

            <div id="conn-status" class="text-xs text-center py-2 rounded bg-slate-700 text-slate-400">
                Disconnected
            </div>
        </div>

        <div class="p-6 text-xs text-slate-500 border-t border-slate-700 text-center">
            v0.8.0 &bull; Powered by UniMCP
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- Header/Tabs -->
        <header class="bg-slate-800 border-b border-slate-700 px-6 pt-4">
            <div class="flex gap-4">
                <button onclick="app.setTab('explorer')" id="tab-explorer"
                        class="px-4 py-2 text-sm font-medium rounded-t-lg transition-colors border-b-2 border-blue-500 bg-slate-700 text-white">
                    🔍 Explorer
                </button>
                <button onclick="app.setTab('tester')" id="tab-tester"
                        class="px-4 py-2 text-sm font-medium rounded-t-lg transition-colors border-b-2 border-transparent hover:bg-slate-700 text-slate-400">
                    🛠️ Tool Tester
                </button>
            </div>
        </header>

        <!-- Viewport -->
        <div id="viewport" class="p-6 overflow-y-auto flex-1 bg-slate-900">
            <!-- Explorer View -->
            <div id="view-explorer" class="grid grid-cols-3 gap-6">
                <section>
                    <h3 class="text-sm font-semibold text-slate-400 uppercase mb-4 flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full"></span> Tools
                    </h3>
                    <div id="list-tools" class="space-y-2">
                        <p class="text-slate-500 italic text-sm">Connect to a server to see tools...</p>
                    </div>
                </section>
                <section>
                    <h3 class="text-sm font-semibold text-slate-400 uppercase mb-4 flex items-center gap-2">
                        <span class="w-2 h-2 bg-blue-500 rounded-full"></span> Prompts
                    </h3>
                    <div id="list-prompts" class="space-y-2">
                        <p class="text-slate-500 italic text-sm">Connect to a server to see prompts...</p>
                    </div>
                </section>
                <section>
                    <h3 class="text-sm font-semibold text-slate-400 uppercase mb-4 flex items-center gap-2">
                        <span class="w-2 h-2 bg-purple-500 rounded-full"></span> Resources
                    </h3>
                    <div id="list-resources" class="space-y-2">
                        <p class="text-slate-500 italic text-sm">Connect to a server to see resources...</p>
                    </div>
                </section>
            </div>

            <!-- Tester View -->
            <div id="view-tester" class="hidden max-w-3xl mx-auto w-full space-y-6">
                <div class="bg-slate-800 border border-slate-700 rounded-lg p-6 shadow-xl">
                    <div id="tool-header" class="mb-6">
                        <h2 id="selected-tool-name" class="text-2xl font-bold text-white">No Tool Selected</h2>
                        <p id="selected-tool-desc" class="text-slate-400 mt-2">Please select a tool from the explorer.</p>
                    </div>

                    <div id="dynamic-form" class="space-y-4">
                        <!-- Inputs generated by forms.js -->
                    </div>

                    <div class="mt-8 flex justify-end">
                        <button id="btn-execute" onclick="app.executeTool()"
                                class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-medium transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                            Execute Tool
                        </button>
                    </div>
                </div>

                <div id="result-container" class="hidden space-y-2">
                    <h3 class="text-sm font-semibold text-slate-400 uppercase">Execution Result</h3>
                    <pre id="result-output" class="bg-black border border-slate-700 p-4 rounded-lg text-green-400 font-mono text-sm overflow-x-auto whitespace-pre-wrap"></pre>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/forms.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
